services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - DATABASE_DSN=/data/habit.db
    restart: unless-stopped

  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    working_dir: /src
    volumes:
      - .:/src
      - ./data:/data
    environment:
      - DATABASE_DSN=/data/habit.db
    profiles:
      - dev
