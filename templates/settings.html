<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定 - Habit Growth Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
    }

    header {
      padding: 24px 16px 16px;
      border-bottom: 1px solid #e5e5e5;
      max-width: 600px;
      margin: 0 auto;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 700;
    }

    .back-link {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.75rem;
      color: #9ca3af;
      text-decoration: none;
    }

    .back-link:hover {
      color: #111;
    }

    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #9ca3af;
      padding: 16px 0 8px;
    }

    .error {
      font-size: 0.75rem;
      color: #dc2626;
      padding: 12px 0 0;
    }

    .habit-exp-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #e5e5e5;
    }

    .habit-exp-name {
      font-size: 1rem;
      font-weight: 700;
    }

    .habit-exp-input {
      width: 64px;
      padding: 4px 8px;
      font-size: 1rem;
      border: 1px solid #e5e5e5;
      text-align: right;
    }

    .habit-exp-input:focus {
      outline: 2px solid #2563eb;
      outline-offset: 1px;
    }

    .total-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      font-size: 0.75rem;
      color: #9ca3af;
    }

    .save-btn {
      display: block;
      margin-top: 16px;
      padding: 8px 20px;
      font-size: 0.75rem;
      font-weight: 700;
      background: #2563eb;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    .save-btn:hover {
      background: #1d4ed8;
    }

    .save-btn:focus-visible {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <header>
    <h1>設定</h1>
    <a class="back-link" href="/">ダッシュボードに戻る</a>
  </header>

  <main>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    <p class="section-title">基本経験値</p>
    <form method="post" action="/settings">
      {{range .Habits}}
      <div class="habit-exp-item">
        <span class="habit-exp-name">{{.Name}}</span>
        <input class="habit-exp-input" type="number" name="exp_{{.ID}}" value="{{.ExpPerDone}}" min="1">
      </div>
      {{end}}
      <div class="total-row">
        <span>合計</span>
        <span>合計: {{.TotalExp}}</span>
      </div>
      <button class="save-btn" type="submit">保存</button>
    </form>
  </main>
</body>
</html>
