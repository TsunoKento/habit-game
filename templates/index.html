<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Growth Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #6c63ff, #3f51b5);
      color: #fff;
      padding: 24px 16px 32px;
      text-align: center;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    header .date {
      margin-top: 4px;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    .overall-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 16px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.75rem;
      opacity: 0.8;
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    main {
      max-width: 600px;
      margin: -16px auto 0;
      padding: 0 16px 40px;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .habit-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .habit-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .habit-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .habit-name {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      letter-spacing: 0.03em;
    }

    .badge-done {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .badge-pending {
      background: #fff3e0;
      color: #e65100;
    }

    .habit-stats {
      display: flex;
      gap: 20px;
      margin-bottom: 14px;
    }

    .habit-stat {
      display: flex;
      flex-direction: column;
    }

    .habit-stat-value {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .habit-stat-label {
      font-size: 0.7rem;
      color: #999;
      margin-top: 2px;
    }

    .streak-value {
      color: #ff6d00;
    }

    .check-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .check-btn:not(:disabled) {
      background: #6c63ff;
      color: #fff;
    }

    .check-btn:not(:disabled):hover {
      background: #574fd6;
    }

    .check-btn:disabled {
      background: #e0e0e0;
      color: #aaa;
      cursor: default;
    }
  </style>
</head>
<body>
  <header>
    <h1>Habit Growth Tracker</h1>
    <p class="date">{{.Today}}</p>
    <div class="overall-stats">
      <div class="stat">
        <div class="stat-value">Lv.{{.TotalLevel}}</div>
        <div class="stat-label">総合レベル</div>
      </div>
      <div class="stat">
        <div class="stat-value">{{.TotalExp}}</div>
        <div class="stat-label">総合 EXP</div>
      </div>
    </div>
  </header>

  <main>
    <p class="section-title">今日の習慣</p>
    <div class="habit-cards">
      {{range .Habits}}
      <div class="habit-card">
        <div class="habit-card-header">
          <span class="habit-name">{{.Name}}</span>
          {{if .Done}}
          <span class="badge badge-done">達成済み</span>
          {{else}}
          <span class="badge badge-pending">未達成</span>
          {{end}}
        </div>
        <div class="habit-stats">
          <div class="habit-stat">
            <span class="habit-stat-value">Lv.{{.Level}}</span>
            <span class="habit-stat-label">レベル</span>
          </div>
          <div class="habit-stat">
            <span class="habit-stat-value">{{.TotalExp}}</span>
            <span class="habit-stat-label">累計 EXP</span>
          </div>
          <div class="habit-stat">
            <span class="habit-stat-value streak-value">{{.Streak}}日</span>
            <span class="habit-stat-label">連続達成</span>
          </div>
        </div>
        <button class="check-btn" {{if .Done}}disabled{{end}}>
          {{if .Done}}達成済み{{else}}達成する{{end}}
        </button>
      </div>
      {{end}}
    </div>
  </main>
</body>
</html>
